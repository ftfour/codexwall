name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    env:
      SIGNING_ENABLED: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Prepare release signing
        if: env.SIGNING_ENABLED == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release-keystore.jks
          {
            echo "storeFile=${{ github.workspace }}/release-keystore.jks"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > keystore.properties

      - name: Build signed release APK
        if: env.SIGNING_ENABLED == 'true'
        run: ./gradlew :app:assembleRelease

      - name: Build debug APK fallback
        if: env.SIGNING_ENABLED != 'true'
        run: ./gradlew :app:assembleDebug

      - name: Rename APK
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk codex-limits-wallpaper-${{ github.ref_name }}.apk
          else
            cp app/build/outputs/apk/debug/app-debug.apk codex-limits-wallpaper-${{ github.ref_name }}-debug.apk
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: codex-limits-wallpaper-${{ github.ref_name }}*.apk
          generate_release_notes: true
