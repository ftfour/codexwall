name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Prepare release signing
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release-keystore.jks
          {
            echo "storeFile=${{ github.workspace }}/release-keystore.jks"
            echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}"
          } > keystore.properties

      - name: Build signed release APK
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: ./gradlew :app:assembleRelease

      - name: Build debug APK fallback
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 == '' }}
        run: ./gradlew :app:assembleDebug

      - name: Rename APK
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk codex-limits-wallpaper-${{ github.ref_name }}.apk
          else
            cp app/build/outputs/apk/debug/app-debug.apk codex-limits-wallpaper-${{ github.ref_name }}-debug.apk
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: codex-limits-wallpaper-${{ github.ref_name }}*.apk
          generate_release_notes: true
